<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>En una nota</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:
linear-gradient(
135deg,
#09090b,
#111827,
#18181b
);

color:white;

font-family:
Segoe UI;

height:100vh;

display:flex;

justify-content:center;

align-items:center;
}

.card{

width:520px;

padding:35px;

border-radius:24px;

background:
rgba(
255,
255,
255,
0.04
);

backdrop-filter:
blur(30px);

box-shadow:
0 10px 60px
rgba(
0,
0,
0,
0.4);

}

.logo{

font-size:40px;

font-weight:700;

margin-bottom:8px;

}

.sub{

font-size:15px;

opacity:.75;

margin-bottom:25px;

}

button{

width:100%;

padding:18px;

border:none;

border-radius:15px;

font-size:18px;

cursor:pointer;

}

.spotify{

background:#1DB954;

font-weight:700;

}

.play{

margin-top:20px;

background:#ffffff15;

color:white;

}

input{

background:#ffffff08;

color:white;

margin-top:20px;

width:100%;

padding:18px;

border:none;

border-radius:15px;

}

.oculto{

display:none;

}

#nota{

font-size:75px;

margin:25px;

text-align:center;

}

#estado{

margin-top:20px;

text-align:center;

}

.stats{

display:flex;

justify-content:space-between;

margin-top:20px;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">

🎵 En una nota

</div>

<div
class="sub"
id="usuario">

¿Reconocés tus propias canciones?

</div>

<button
class="spotify"
onclick="loginSpotify()">

Conectar Spotify

</button>

<div
id="juego"
class="oculto">

<hr>

<div class="stats">

<div>

Puntos:
<span id="puntos">
0
</span>

</div>

<div>

Ronda:
<span id="ronda">
1
</span>

</div>

</div>

<div id="nota">

♪

</div>

<button
class="play"
onclick="reproducir()">

▶ Escuchar fragmento

</button>

<input
id="respuesta"
placeholder="Nombre de la canción">

<button
class="spotify"
onclick="adivinar()">

Adivinar

</button>

<div id="estado">

Esperando...

</div>

</div>

</div>

<script src="spotify.js?v=pkce-3"></script>

<script>

window.onload=
async function(){

if(
conectado()
){

document
.querySelector(
".spotify"
)
.style.display=
"none"

document
.getElementById(
"juego"
)
.classList
.remove(
"oculto"
)

if(
typeof iniciarJuego
===
"function"
){

await iniciarJuego()

}

}

}

document
.getElementById(
"respuesta"
)
.addEventListener(
"keydown",
function(event){

if(
event.key
===
"Enter"
){

adivinar()

}

}
)

</script>

</body>

</html>
