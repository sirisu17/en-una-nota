<!DOCTYPE html>
<html>

<head>

<title>En una nota</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:
linear-gradient(
135deg,
#09090b,
#111827,
#18181b
);

color:white;

font-family:

Segoe UI;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

.card{

width:520px;

padding:35px;

border-radius:24px;

background:

rgba(
255,
255,
255,
0.04
);

backdrop-filter:
blur(30px);

box-shadow:

0 10px 60px
rgba(
0,
0,
0,
0.4
);

}

.logo{

font-size:40px;

font-weight:700;

margin-bottom:8px;

}

.sub{

font-size:15px;

opacity:.75;

margin-bottom:25px;

}

button{

font-weight:600;

width:100%;

padding:18px;

border:none;

border-radius:15px;

font-size:18px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:
translateY(-3px);

}

.spotify{

background:
#1DB954;

font-weight:bold;

}

.play{

margin-top:20px;

background:
#ffffff15;

color:white;

}

input{
background:#ffffff08;

color:white;
margin-top:20px;

width:100%;

padding:18px;

border-radius:15px;

border:none;

font-size:18px;

}

.oculto{

display:none;

}

#nota{

font-size:75px;

margin:25px;

opacity:.85;

}

#estado{

margin-top:20px;

text-align:center;

font-size:22px;

}

.stats{

display:flex;

justify-content:space-between;

margin-top:20px;

opacity:.8;

}

hr{

margin:25px 0;

border-color:
#ffffff10;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">

🎵 En una nota

</div>

<div class="sub" id="usuario">

Conectando...

</div>

¿Reconocés tus propias canciones?

</div>

<button
class="spotify"
onclick="loginSpotify()">

Conectar Spotify

</button>

<div
id="juego"
class="oculto">

<hr>

<div class="stats">

<div>

Puntos:
<span id="puntos">

0

</span>

</div>

<div>

Ronda:
<span id="ronda">

1

</span>

</div>

</div>

<div id="nota">

♪

</div>

<button
class="play"
onclick="reproducir()">

▶ Escuchar fragmento

</button>

<input
id="respuesta"
placeholder="Nombre de la canción">

<button
class="spotify"
onclick="adivinar()">

Adivinar

</button>

<div id="estado">

Esperando...

</div>

</div>

</div>

<script>

let canciones=[

"Believer",

"Starboy",

"Blinding Lights",

"Shape Of You",

"Heat Waves",

"Industry Baby"

]

let actual=

canciones[
Math.floor(
Math.random()
*
canciones.length
)
]

let puntos=0

let ronda=1

function entrar(){

juego
.classList
.remove(
"oculto"
)

}

function reproducir(){

let notas=

[
"♪",
"♫",
"♬"
]

nota
.innerHTML=

notas[
Math.floor(
Math.random()
*
notas.length
)

]

}

function adivinar(){

let valor=

respuesta
.value
.toLowerCase()

if(

valor

===

actual
.toLowerCase()

){

puntos++

estado
.innerHTML=

"✅ Correcto"

puntosHTML()

siguiente()

}

else{

estado
.innerHTML=

"❌ Probá otra"

}

}

function puntosHTML(){

document
.getElementById(
"puntos"
)
.innerHTML=
puntos

}

function siguiente(){

ronda++

document
.getElementById(
"ronda"
)
.innerHTML=
ronda

actual=

canciones[
Math.floor(
Math.random()
*
canciones.length
)
]

respuesta
.value=""

}

</script>
<script src="audio.js"></script>
<script src="spotify.js"></script>

<script>

window.onload=function(){

if(
conectado()
){

document
.getElementById(
"juego"
)
.classList
.remove(
"oculto"
)
obtenerCanciones()
document
.querySelector(
".spotify"
)
.style.display=
"none"

}

}

</script>
</body>

</html>
